{
  "$schema": "https://github.com/fastfetch-cli/fastfetch/raw/dev/doc/json_schema.json",
  "logo": {
    "source": "/home/mediees/.local/share/fastfetch/images/archlinux.png",
    "type": "kitty",
    "width": 25,
    "height": 12,
    "padding": {
      "top": 2,
      "left": 2
    }
  },
  "display": {
    "separator": "  ",
    "color": "cyan"
  },
  "modules": [
    {
      "type": "title",
      "format": "{user-name}@{host-name}",
      "color": {
        "user": "cyan",
        "at": "white",
        "host": "cyan"
      }
    },
    "break",
    {
      "type": "os",
      "key": "󰣇",
      "keyColor": "cyan"
    },
    {
      "type": "kernel",
      "key": "",
      "keyColor": "cyan"
    },
    {
      "type": "packages",
      "key": "󰏖",
      "keyColor": "cyan"
    },
    {
      "type": "shell",
      "key": "",
      "keyColor": "cyan"
    },
    {
      "type": "terminal",
      "key": "",
      "keyColor": "cyan"
    },
    {
      "type": "wm",
      "key": "",
      "keyColor": "cyan"
    },
    {
      "type": "uptime",
      "key": "󱎫",
      "keyColor": "cyan"
    },
    {
      "type": "media",
      "key": "󰝚",
      "keyColor": "cyan"
    },
    "break",
    {
      "type": "colors",
      "symbol": "square",
      "block": {
          "range": [0, 7] 
      }
    }
  ]
}
